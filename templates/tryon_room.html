<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Try-On Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-img { width: 80px; height: 100px; object-fit: cover; border-radius: 6px; border: 2px solid #eee; margin: 0 8px 8px 0; cursor: pointer; transition: border 0.2s; }
        .product-img.selected { border: 3px solid #0d6efd; }
        .color-picker { width: 32px; height: 32px; border: none; margin-left: 8px; }
        .section { margin-bottom: 24px; }
        .section-title { font-size: 1.2rem; font-weight: 500; margin-bottom: 12px; }
        .tryon-btn { background: #28a745; color: white; padding: 8px 24px; border: none; border-radius: 6px; font-weight: 500; }
        .tryon-btn:hover { background: #218838; }
        .back-btn { color: #6c757d; text-decoration: none; }
        .back-btn:hover { color: #495057; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <a href="{{ url_for('index') }}" class="back-btn">&larr; Back to Store</a>
        <h2 class="mt-3 mb-4">Virtual Try-On Room</h2>
        
        <div class="row">
            <div class="col-md-8">
                <div class="section">
                    <div class="section-title">Select a Shirt</div>
                    <div class="d-flex flex-wrap" id="shirtSelection">
                        {% for s in shirts %}
                        <div>
                            <img src="{{ url_for('static', filename='images/shirts/' + s) }}" 
                                 class="product-img" 
                                 data-type="shirt" 
                                 data-fname="{{ s }}" 
                                 onclick="selectItem('shirt','{{ s }}', this)">
                            <input type="color" 
                                   class="color-picker" 
                                   value="#ffffff" 
                                   onchange="updateColor('shirt','{{ s }}',this.value)">
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Select a Pant</div>
                    <div class="d-flex flex-wrap" id="pantSelection">
                        {% for p in pants %}
                        <div>
                            <img src="{{ url_for('static', filename='images/pants/' + p) }}" 
                                 class="product-img" 
                                 data-type="pant" 
                                 data-fname="{{ p }}" 
                                 onclick="selectItem('pant','{{ p }}', this)">
                            <input type="color" 
                                   class="color-picker" 
                                   value="#ffffff" 
                                   onchange="updateColor('pant','{{ p }}',this.value)">
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Select a Saree</div>
                    <div class="d-flex flex-wrap" id="sareeSelection">
                        {% for s in sarees %}
                        <div>
                            <img src="{{ url_for('static', filename='images/saree/' + s) }}" 
                                 class="product-img" 
                                 data-type="saree" 
                                 data-fname="{{ s }}" 
                                 onclick="selectItem('saree','{{ s }}', this)">
                            <input type="color" 
                                   class="color-picker" 
                                   value="#ffffff" 
                                   onchange="updateColor('saree','{{ s }}',this.value)">
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <button class="tryon-btn" onclick="startTryOn()">Start Try-On</button>
            </div>
        </div>
    </div>

    <form method="POST" action="/start-tryon" id="tryon_form" target="_blank" style="display:none;">
        <input type="hidden" name="shirt" id="shirt_input">
        <input type="hidden" name="pant" id="pant_input">
        <input type="hidden" name="saree" id="saree_input">
        <input type="hidden" name="shirt_color" id="shirt_color_input" value="#ffffff">
        <input type="hidden" name="pant_color" id="pant_color_input" value="#ffffff">
        <input type="hidden" name="saree_color" id="saree_color_input" value="#ffffff">
    </form>

    <script>
        let selectedItems = { shirt: null, pant: null, saree: null };
        let colors = { shirt: {}, pant: {}, saree: {} };

        function selectItem(type, fname, imgEl) {
            // Deselect all of this type
            document.querySelectorAll(`.product-img[data-type="${type}"]`).forEach(el => {
                el.classList.remove('selected');
            });
            
            // If clicking the same item, deselect it
            if (selectedItems[type] === fname) {
                selectedItems[type] = null;
                colors[type][fname] = '#ffffff';
            } else {
                // Select the new item
                imgEl.classList.add('selected');
                selectedItems[type] = fname;
            }
        }

        function updateColor(type, fname, color) {
            if (selectedItems[type] === fname) {
                colors[type][fname] = color;
            }
        }

        function startTryOn() {
            document.getElementById('shirt_input').value = selectedItems.shirt || '';
            document.getElementById('pant_input').value = selectedItems.pant || '';
            document.getElementById('saree_input').value = selectedItems.saree || '';
            
            document.getElementById('shirt_color_input').value = selectedItems.shirt ? (colors.shirt[selectedItems.shirt] || '#ffffff') : '#ffffff';
            document.getElementById('pant_color_input').value = selectedItems.pant ? (colors.pant[selectedItems.pant] || '#ffffff') : '#ffffff';
            document.getElementById('saree_color_input').value = selectedItems.saree ? (colors.saree[selectedItems.saree] || '#ffffff') : '#ffffff';
            
            document.getElementById('tryon_form').submit();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
